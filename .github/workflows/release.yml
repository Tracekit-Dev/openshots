name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --target aarch64-apple-darwin
            label: macOS-arm64
          - os: macos-latest
            args: --target x86_64-apple-darwin
            label: macOS-x64
          - os: ubuntu-24.04
            args: ''
            label: Linux
          - os: windows-latest
            args: ''
            label: Windows

    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libpipewire-0.3-dev libgbm-dev libegl-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Terry Osayawe (7D33GSZV3K)"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OpenShots ${{ github.ref_name }}'
          releaseBody: |
            Download the installer for your platform below.

            **macOS:** Download the `.dmg` file, open it, and drag OpenShots to Applications.
            **Windows:** Download and run the `.msi` installer.
            **Linux:** Download the `.AppImage` (make executable with `chmod +x`) or `.deb` package.

            ### CLI
            Standalone CLI binaries are attached below. Download the one for your platform, make it executable, and add it to your PATH.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Build CLI binary
        run: cargo build --release --manifest-path src-tauri/Cargo.toml --bin openshots-cli ${{ matrix.os == 'macos-latest' && matrix.args == '--target aarch64-apple-darwin' && '--target aarch64-apple-darwin' || matrix.os == 'macos-latest' && '--target x86_64-apple-darwin' || '' }}

      - name: Rename CLI binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          if [ "${{ matrix.label }}" = "macOS-arm64" ]; then
            TARGET_DIR="src-tauri/target/aarch64-apple-darwin/release"
            SUFFIX="darwin-arm64"
          elif [ "${{ matrix.label }}" = "macOS-x64" ]; then
            TARGET_DIR="src-tauri/target/x86_64-apple-darwin/release"
            SUFFIX="darwin-x64"
          else
            TARGET_DIR="src-tauri/target/release"
            SUFFIX="linux-x64"
          fi
          cp "$TARGET_DIR/openshots-cli" "openshots-cli-$SUFFIX"
          chmod +x "openshots-cli-$SUFFIX"

      - name: Rename CLI binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Copy-Item "src-tauri/target/release/openshots-cli.exe" "openshots-cli-windows-x64.exe"

      - name: Upload CLI to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: openshots-cli-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
